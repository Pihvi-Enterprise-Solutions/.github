name: SEO/GEO Content Pipeline

on:
  workflow_call:
    inputs:
      step:
        description: "Pipeline step: all, research, analyze, generate, refresh, geo, build"
        required: false
        default: "all"
        type: string
      node_version:
        description: "Node.js version"
        required: false
        default: "22"
        type: string
      config_path:
        description: "Path to seo-config.yml"
        required: false
        default: "seo-config.yml"
        type: string
      dry_run:
        description: "Skip PR creation"
        required: false
        default: false
        type: boolean
      package_version:
        description: "seo-geo-engine package version"
        required: false
        default: "latest"
        type: string
    secrets:
      DATAFORSEO_LOGIN:
        required: true
      DATAFORSEO_PASSWORD:
        required: true
      FIRECRAWL_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Configure GitHub Packages registry
        run: |
          echo "@pihvi-enterprise-solutions:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install seo-engine
        run: npm install -g @pihvi-enterprise-solutions/seo-geo-engine@${{ inputs.package_version }}

      # Restore cache from previous runs
      - name: Restore artifact cache
        uses: actions/cache@v4
        with:
          path: .seo-engine
          key: seo-engine-${{ hashFiles(inputs.config_path) }}-${{ github.run_number }}
          restore-keys: |
            seo-engine-${{ hashFiles(inputs.config_path) }}-

      - name: Run pipeline
        run: seo-engine ${{ inputs.step == 'all' && 'pipeline' || inputs.step }} --config ${{ inputs.config_path }}
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Save artifacts for caching across runs
      - name: Save artifact cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .seo-engine
          key: seo-engine-${{ hashFiles(inputs.config_path) }}-${{ github.run_number }}

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seo-pipeline-results
          path: .seo-engine/*.json
          retention-days: 30

      - name: Generate PR body
        if: inputs.dry_run == false
        id: pr-body
        run: |
          BODY="## SEO/GEO Content Pipeline Results\n\n"

          if [ -f .seo-engine/keyword-research.json ]; then
            KEYWORDS=$(python3 -c "
          import json
          d = json.load(open('.seo-engine/keyword-research.json'))
          print(f\"- **Keywords found:** {d.get('total_keywords', 'N/A')}\")
          print(f\"- **Search volume:** {d.get('total_volume', 'N/A')}\")
          print(f\"- **Clusters:** {len(d.get('clusters', []))}\")
          " 2>/dev/null || echo "- Keyword data in artifacts")
            BODY="${BODY}### Keyword Research\n${KEYWORDS}\n\n"
          fi

          if [ -f .seo-engine/generated-content.json ]; then
            ARTICLES=$(python3 -c "
          import json
          d = json.load(open('.seo-engine/generated-content.json'))
          for a in d.get('articles', []):
              print(f\"- **{a['title']}** ({a.get('word_count', '?')} words, keyword: \`{a['keyword']}\`)\")
          " 2>/dev/null || echo "- Content generated")
            BODY="${BODY}### Generated Articles\n${ARTICLES}\n\n"
          fi

          if [ -f .seo-engine/geo-report.json ]; then
            GEO=$(python3 -c "
          import json
          d = json.load(open('.seo-engine/geo-report.json'))
          for a in d.get('articles', []):
              print(f\"- **{a.get('path','?').split('/')[-1]}**: GEO Score {a.get('geo_score','?')}/100\")
          " 2>/dev/null || echo "- GEO report in artifacts")
            BODY="${BODY}### GEO Scores\n${GEO}\n\n"
          fi

          BODY="${BODY}> All articles are drafts. Review before publishing.\n\n---\n*Generated by seo-geo-engine*"
          echo -e "$BODY" > /tmp/pr-body.md

      - name: Create Pull Request
        if: inputs.dry_run == false
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "content: add SEO/GEO optimized articles"
          title: "SEO Content: New articles from pipeline"
          body-path: /tmp/pr-body.md
          branch: seo-content/${{ github.run_number }}
          labels: seo-content,auto-generated
          delete-branch: true
