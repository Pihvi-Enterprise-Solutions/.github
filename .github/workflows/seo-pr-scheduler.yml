name: SEO Content Publisher

# Merges the oldest approved PR with "seo-content" label.
# Runs one merge per trigger — schedule on multiple days to spread publishing.
#
# Example: cron "0 9 * * 2,4" = Tuesday + Thursday 9am UTC
# With 2 PRs approved on Monday, the first merges Tuesday, second Thursday.

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to seo-config.yml (used to read publish_days)"
        required: false
        default: "seo-config.yml"
        type: string
      label:
        description: "PR label to filter on"
        required: false
        default: "seo-content"
        type: string
      merge_method:
        description: "Merge method: merge, squash, or rebase"
        required: false
        default: "squash"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Find oldest approved SEO content PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ inputs.label }}
        run: |
          echo "Looking for approved PRs with label: $LABEL"

          # Get open PRs with the seo-content label, sorted by creation date (oldest first)
          PR_NUMBER=$(gh pr list \
            --label "$LABEL" \
            --state open \
            --json number,reviews,createdAt \
            --jq '
              [.[] | select(
                .reviews | length > 0 and
                any(.[]; .state == "APPROVED")
              )] |
              sort_by(.createdAt) |
              first |
              .number // empty
            ')

          if [ -z "$PR_NUMBER" ]; then
            echo "No approved PRs with label '$LABEL' found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found PR #$PR_NUMBER"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.find-pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
          MERGE_METHOD: ${{ inputs.merge_method }}
        run: |
          echo "Merging PR #$PR_NUMBER via $MERGE_METHOD..."
          gh pr merge "$PR_NUMBER" \
            --"$MERGE_METHOD" \
            --delete-branch \
            --admin

          echo "PR #$PR_NUMBER merged successfully."

      - name: Summary
        if: always()
        env:
          FOUND: ${{ steps.find-pr.outputs.found }}
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        run: |
          if [ "$FOUND" = "true" ]; then
            echo "### Published" >> "$GITHUB_STEP_SUMMARY"
            echo "Merged PR #$PR_NUMBER" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No content to publish" >> "$GITHUB_STEP_SUMMARY"
            echo "No approved PRs with the seo-content label found." >> "$GITHUB_STEP_SUMMARY"
          fi
