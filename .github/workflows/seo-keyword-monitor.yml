name: SEO Keyword Monitor

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        default: "22"
        type: string
      config_path:
        required: false
        default: "seo-config.yml"
        type: string
      package_version:
        required: false
        default: "latest"
        type: string
    secrets:
      DATAFORSEO_LOGIN:
        required: true
      DATAFORSEO_PASSWORD:
        required: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Configure GitHub Packages registry
        run: |
          echo "@pihvi-enterprise-solutions:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install seo-engine
        run: npm install -g @pihvi-enterprise-solutions/seo-geo-engine@${{ inputs.package_version }}

      - name: Restore ranking history
        uses: actions/cache@v4
        with:
          path: .seo-engine/ranking-history.json
          key: seo-rankings-${{ hashFiles(inputs.config_path) }}-${{ github.run_number }}
          restore-keys: |
            seo-rankings-${{ hashFiles(inputs.config_path) }}-

      - name: Run monitor
        run: seo-engine monitor --config ${{ inputs.config_path }}
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}

      - name: Save ranking history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .seo-engine/ranking-history.json
          key: seo-rankings-${{ hashFiles(inputs.config_path) }}-${{ github.run_number }}

      - name: Create issue for changes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.seo-engine/monitor-report.json';
            if (!fs.existsSync(path)) return;

            const report = JSON.parse(fs.readFileSync(path, 'utf-8'));
            if (!report.significant_changes?.length) {
              console.log('No significant changes.');
              return;
            }

            let body = `## Weekly SEO Ranking Report\n\n**Date:** ${report.date}\n\n`;

            if (report.improvements?.length) {
              body += '### Improvements\n';
              for (const i of report.improvements)
                body += `- **${i.keyword}**: ${i.old_position} → ${i.new_position} (+${i.change})\n`;
              body += '\n';
            }
            if (report.declines?.length) {
              body += '### Declines\n';
              for (const d of report.declines)
                body += `- **${d.keyword}**: ${d.old_position} → ${d.new_position} (${d.change})\n`;
              body += '\n';
            }
            if (report.opportunities?.length) {
              body += '### Opportunities\n';
              for (const o of report.opportunities)
                body += `- **${o.keyword}** (vol: ${o.volume})\n`;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `SEO: ${report.significant_changes.length} ranking changes detected`,
              body,
              labels: ['seo-report']
            });
